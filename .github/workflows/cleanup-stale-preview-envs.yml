name: cleanup-stale-previews

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  cleanup-stale:
    runs-on: kubernetes-runner
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      deployments: write

    steps:
      - name: Create Kubernetes context
        id: create-context
        uses: eidp/actions-kubernetes/create-context@b8664ed5da126e300a1c45dde88d50e7ee6b1af4 # v1.2.0
        with:
          cluster: development
          api-server: ${{ vars.K8S_API_SERVER_DEVELOPMENT }}
          certificate-authority-data:
            ${{ secrets.K8S_CERTIFICATE_AUTHORITY_DATA_DEVELOPMENT }}
          keycloak-url: ${{ vars.KEYCLOAK_URL }}
          token-exchange-client-id: ${{ secrets.TOKEN_EXCHANGE_CLIENT_ID }}
          token-exchange-client-secret: ${{ secrets.TOKEN_EXCHANGE_CLIENT_SECRET }}


      - name: Cleanup previews older than 7 days
        uses: eidp/actions-kubernetes/teardown-preview@b8664ed5da126e300a1c45dde88d50e7ee6b1af4 # v1.2.0
        with:
          kubernetes-context: ${{ steps.create-context.outputs.context-name }}
          github-token: ${{ github.token }}
          max-age: 7d
